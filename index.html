<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mikolo M4 — 5-Day PPL/UL Split</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0D0D0F;--surface:#141418;--surface2:#1C1C22;--surface3:#242430;
  --border:#2A2A35;--border2:#35354A;--accent:#FF5722;
  --text:#F0F0F5;--text2:#9999AA;--text3:#5F5F75;
  --smith:#9B86FF;--cable:#60A5FA;--barbell:#FB923C;--landmine:#86EFAC;--dumbbell:#FCD34D;
  --primary-m:#FF5722;--secondary-m:#3A7EFF;
  --font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.hero{position:relative;padding:1.6rem 1.4rem 1.3rem;border-bottom:1px solid var(--border);overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(255,87,34,.1) 0%,transparent 70%);pointer-events:none;}
.hero-eyebrow{font-family:var(--font-head);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem;}
.hero-title{font-family:var(--font-head);font-size:1.9rem;font-weight:800;letter-spacing:-.01em;line-height:1.05;color:var(--text);}
.hero-title span{color:var(--accent);}
.hero-subtitle{font-size:.78rem;color:var(--text2);margin-top:.3rem;}
.equipment-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:.8rem;}
.ep{font-family:var(--font-head);font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:3px;border:1px solid;}
.ep-smith{color:var(--smith);border-color:rgba(155,134,255,.35);background:rgba(155,134,255,.08);}
.ep-cable{color:var(--cable);border-color:rgba(96,165,250,.35);background:rgba(96,165,250,.08);}
.ep-bb{color:var(--barbell);border-color:rgba(251,146,60,.35);background:rgba(251,146,60,.08);}
.ep-land{color:var(--landmine);border-color:rgba(134,239,172,.35);background:rgba(134,239,172,.08);}
.ep-db{color:var(--dumbbell);border-color:rgba(252,211,77,.35);background:rgba(252,211,77,.08);}
.main{padding:1.1rem 1.1rem 3rem;}
.day-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:1.1rem;}
.day-tab{position:relative;padding:9px 3px 7px;text-align:center;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;background:var(--surface);transition:all .15s;overflow:hidden;}
.day-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;transition:background .15s;}
.day-tab:hover{background:var(--surface2);}
.day-tab.on{background:var(--surface2);border-color:var(--border2);}
.day-tab .tab-short{font-size:9px;font-family:var(--font-head);font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);display:block;}
.day-tab.on .tab-short{color:var(--tab-accent);}
.day-tab .tab-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.03em;text-transform:uppercase;}
.day-tab.on .tab-name{color:var(--tab-accent);}
.day-tab.on::after{background:var(--tab-accent);}
.ex-nav{display:flex;align-items:center;gap:7px;margin-bottom:.9rem;}
.nav-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.nav-btn:hover:not(:disabled){background:var(--surface3);border-color:var(--accent);color:var(--accent);}
.nav-btn:disabled{opacity:.25;cursor:default;}
.ex-dots{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
.ex-dot{width:25px;height:25px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);font-family:var(--font-head);font-size:10px;font-weight:700;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ex-dot.on{background:var(--dot-accent);border-color:var(--dot-accent);color:#fff;}
.ex-count{font-family:var(--font-head);font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);white-space:nowrap;text-transform:uppercase;}
.ex-card{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden;}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:.9rem 1rem .75rem;border-bottom:1px solid var(--border);background:var(--surface2);}
.card-title-wrap{flex:1;min-width:0;}
.card-title{font-family:var(--font-head);font-size:1.25rem;font-weight:800;letter-spacing:.01em;text-transform:uppercase;color:var(--text);line-height:1.1;}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:.35rem;}
.badge{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid;}
.b-smith{color:var(--smith);border-color:rgba(155,134,255,.4);background:rgba(155,134,255,.1);}
.b-cable{color:var(--cable);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.1);}
.b-barbell{color:var(--barbell);border-color:rgba(251,146,60,.4);background:rgba(251,146,60,.1);}
.b-landmine{color:var(--landmine);border-color:rgba(134,239,172,.4);background:rgba(134,239,172,.1);}
.b-dumbbell{color:var(--dumbbell);border-color:rgba(252,211,77,.4);background:rgba(252,211,77,.1);}
.card-sets{font-family:var(--font-head);font-size:1rem;font-weight:700;letter-spacing:.04em;color:var(--text2);white-space:nowrap;text-align:right;}
.card-sets .sets-label{display:block;font-size:.65rem;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:1px;}
.card-body{display:grid;grid-template-columns:260px 1fr;gap:0;}
@media(max-width:560px){.card-body{grid-template-columns:1fr;}}
.diagram-panel{background:var(--bg);border-right:1px solid var(--border);padding:.6rem;}
.diagram-panel svg{width:100%;height:auto;display:block;}
@media print{body{background:#fff;color:#111}.hero,.main{padding:.6rem}.ex-nav,.day-tabs{display:none}.ex-card{break-inside:avoid;border-color:#ccc}.card-body{grid-template-columns:240px 1fr}.diagram-panel{background:#fff}.cue-box{background:#fff}}
.info-panel{padding:.9rem 1rem;display:flex;flex-direction:column;gap:.8rem;}
.muscle-section-title{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:.35rem;}
.m-tags{display:flex;flex-wrap:wrap;gap:4px;}
.m-tag{font-size:.7rem;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid;}
.m-primary{color:#FF8A6A;border-color:rgba(255,87,34,.35);background:rgba(255,87,34,.1);}
.m-secondary{color:#7BA7FF;border-color:rgba(58,126,255,.3);background:rgba(58,126,255,.08);}
.cue-box{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:.6rem .8rem;}
.cue-box .cue-label{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.25rem;display:block;}
.cue-box p{font-size:.75rem;color:var(--text2);line-height:1.6;}

.video-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;}
.video-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:.55rem .75rem;border-bottom:1px solid var(--border);}
.video-title{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.video-tip{font-size:.66rem;color:var(--text3);}
.video-frame{position:relative;width:100%;aspect-ratio:16/9;background:#09090c;display:flex;align-items:center;justify-content:center;}
.video-frame iframe,.video-frame video{position:absolute;inset:0;width:100%;height:100%;border:0;}
.video-empty{padding:1rem;text-align:center;color:var(--text2);font-size:.75rem;line-height:1.55;}
.video-empty code{display:inline-block;margin-top:.45rem;padding:3px 7px;border:1px solid var(--border2);border-radius:5px;background:var(--bg);color:var(--accent);font-size:.68rem;}
.video-link{color:var(--accent);font-weight:700;text-decoration:none;}
.video-link:hover{text-decoration:underline;}
@media print{.video-section{display:none}}
@media(max-width:560px){.diagram-panel{border-right:none;border-bottom:1px solid var(--border);}
.hero-title{font-size:1.55rem;}}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-eyebrow">Mikolo M4 Smith Machine + Cables</div>
  <div class="hero-title">5-Day <span>PPL/UL</span> Split</div>
  <div class="hero-subtitle">Push · Pull · Legs · Upper · Lower — anatomical muscle-target guide</div>
  <div class="equipment-pills">
    <span class="ep ep-smith">Smith Machine</span>
    <span class="ep ep-cable">Cables</span>
    <span class="ep ep-db">Dumbbells</span>
    <span class="ep ep-bb">Barbell</span>
    <span class="ep ep-land">Landmine</span>
  </div>
</div>
<div class="main">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="ex-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeEx(-1)">&#8592;</button>
    <div class="ex-dots" id="exDots"></div>
    <button class="nav-btn" id="nextBtn" onclick="changeEx(1)">&#8594;</button>
    <span class="ex-count" id="exCount"></span>
  </div>
  <div class="ex-card" id="exCard"></div>
</div>
<script>

// ──────────── HOW TO ADD VIDEOS ────────────
// Each exercise can have a video URL right under its sets value:
// sets:'4 × 8–10', video:'https://www.youtube.com/watch?v=VIDEO_ID',
// Works with YouTube links, YouTube Shorts links, youtu.be links, or direct .mp4/.webm files.
// If video is left blank, the page shows a clear placeholder telling you where to add it.

const eqCls={smith:'b-smith',cable:'b-cable',barbell:'b-barbell',landmine:'b-landmine',dumbbell:'b-dumbbell'};
const eqLbl={smith:'Smith Machine',cable:'Cable',barbell:'Barbell',landmine:'Landmine',dumbbell:'Dumbbell'};
// Skin / bone colors used in diagrams
const P='#FF5722',S='#3A7EFF',EQ='#3A3A4A',EQH='#5A5A6E',MO='#22C55E',SK='#C8956C',SKS='#A0694A',BN='#5A5A70',TX='#888899',F='Barlow Condensed,sans-serif';

const days=[
  {name:'Push',short:'Mon',color:'#FF5722',exercises:[
    {name:'Smith Machine Bench Press',eq:'smith',sets:'4 × 8–10', video:'https://youtu.be/TL79FEmRHn0?si=FIRlPj5Pw2Gt1cHc',
     primary:['Pectoralis Major (mid)'],secondary:['Anterior Deltoid','Triceps'],
     cue:'Unrack and lower the bar to mid-chest with elbows at ~75°. Press straight up. The Smith guides the path — focus on feeling your chest contract rather than fighting balance.',
     diagram:'bench'},
    {name:'Smith Machine Incline Press',eq:'smith',sets:'3 × 10–12', video:'https://youtu.be/FvjSzlPOaLo?si=KA4MlROrKyVVru9v',
     primary:['Pectoralis Major (upper)'],secondary:['Anterior Deltoid','Triceps'],
     cue:'Set bench to 30–45°. The angle shifts emphasis to the upper chest. Lower to the top of your chest, not your chin.',
     diagram:'incline'},
    {name:'Cable Fly',eq:'cable',sets:'3 × 12–15', video:'https://youtu.be/ESGwNk_7bbA?si=nt2ZcOUIDdIvSXZw',
     primary:['Pectoralis Major (stretch)'],secondary:['Anterior Deltoid'],
     cue:'Set both pulleys to chest height. Step forward, arms wide with a soft elbow bend. Arc the handles together in front of your chest — the cable keeps constant tension the entire range unlike dumbbells which go slack at the top. Squeeze hard at the peak.',
     diagram:'cablefly'},
    {name:'Smith Machine OHP',eq:'smith',sets:'3 × 10–12', video:'https://youtu.be/pCRoN4qfDu8?si=ao7w7Q1MeoNolXPY',
     primary:['Anterior Deltoid','Medial Deltoid'],secondary:['Triceps','Upper Trapezius'],
     cue:'Bar starts at collar bone level. Press overhead until arms are fully extended. Lock out at the top, lower under control.',
     diagram:'ohp'},
    {name:'Dumbbell Lateral Raise',eq:'dumbbell',sets:'3 × 12–15', video:'https://youtu.be/XPPfnSEATJA?si=-CbOv4emsCwjf7D7',
     primary:['Medial Deltoid'],secondary:['Anterior Deltoid','Supraspinatus'],
     cue:'Slight bend in elbows. Raise arms out to the side until parallel with the floor — no higher. Take 3 seconds to lower. Do not swing. Can be replaced by Cable Lateral Raise',
     diagram:'lateral'},
    {name:'Cable Tricep Pushdown',eq:'cable',sets:'3 × 12–15', video:'https://youtu.be/UGwoHEiQY7M?si=J4Wr84hry6NxQZYQ',
     primary:['Triceps (Lateral Head)'],secondary:['Triceps (Medial Head)'],
     cue:'Elbows pinned to your sides. Push the rope or bar down until arms are fully straight. Flare wrists out at the bottom, squeeze, then release slowly.',
     diagram:'pushdown'},
    {name:'Cable Overhead Tricep Ext.',eq:'cable',sets:'2 × 12–15', video:'https://youtu.be/rOc96NKXVOo?si=3oqPgEhcyu8xZpHl',
     primary:['Triceps (Long Head)'],secondary:['Triceps (Medial Head)'],
     cue:'Face away from cable. Rope above your head. Hinge elbows, lower the rope behind your head, then extend fully. The long head only fully stretches overhead.',
     diagram:'trioverhead'},
    {name:'Cable Bicep Curl',eq:'cable',sets:'3 x 10 each', video:'https://youtu.be/OXUxCyyU_2E?si=oY5obk2wlqSmUOCL',
     primary:['Biceps (Short Head)'],secondary:['Forearms','Core'],
     cue:'Attach short-bar extension to cable. Slight bend in knees. Curl bar up as high as possible while maintaining elbow and shoulder position.'}
  ]},
  {name:'Pull',short:'Tue',color:'#3A7EFF',exercises:[
    {name:'Smith Machine Bent-Over Row',eq:'smith',sets:'4 × 8–10', video:'https://youtu.be/3QcJggd_L24?si=tohUU2UxjhiMMeY2',
     primary:['Latissimus Dorsi','Rhomboids'],secondary:['Rear Deltoid','Biceps','Erectors'],
     cue:'Hinge forward ~45°, grip the bar overhand. Pull to your lower ribcage, elbows drive back past your torso. Squeeze shoulder blades together at the top.',
     diagram:'row'},
    {name:'Landmine Row',eq:'landmine',sets:'3 × 10–12 each', video:'https://youtu.be/HqxWpecWzlA?si=2oLjm3cHmM6u6oKd',
     primary:['Latissimus Dorsi','Rhomboids'],secondary:['Rear Deltoid','Biceps','Core'],
     cue:'Load one end of the barbell into the landmine socket on the M4. Straddle the bar, hinge forward, grip the end with one or both hands. Drive your elbow back and up — the angled bar path naturally trains the lat through full range. Great for loading the row heavier than a dumbbell.',
     diagram:'landmine_row'},
    {name:'Cable Standing Row',eq:'cable',sets:'3 × 10–12', video:'https://youtu.be/q7Fn27BfIHU?si=nGse4bn7xS43x3oF',
     primary:['Rhomboids','Mid Trapezius'],secondary:['Latissimus Dorsi','Rear Deltoid','Biceps','Core'],
     cue:'Set cable to mid-torso height. Stand back a step, hinge slightly at the hips, brace your core. Pull the handle to your lower ribcage driving elbows back past your torso. Unlike seated rows, your core must stabilize the whole lift — more functional, more total-body tension.',
     diagram:'standingrow'},
    {name:'Dumbbell Single-Arm Row',eq:'dumbbell',sets:'3 × 10–12', video:'https://youtu.be/DMo3HJoawrU?si=6kjJ4LHXnZ3GuiJY',
     primary:['Latissimus Dorsi'],secondary:['Rhomboids','Rear Deltoid','Biceps'],
     cue:'Knee and hand on bench. Let the DB hang fully — get that lat stretch. Drive your elbow straight up toward the ceiling, not out to the side.',
     diagram:'dbrow'},
    {name:'Cable Pulldown',eq:'cable',sets:'3 × 10–12', video:'https://youtu.be/xkZR2vTv9xQ?si=SGmNKHzyKlnX_Ihz',
     primary:['Latissimus Dorsi'],secondary:['Teres Major','Biceps','Rear Deltoid'],
     cue:'Wide overhand grip. Lean back slightly. Drive elbows down and back toward your hips. Pull bar to upper chest. Squeeze at the bottom.',
     diagram:'pulldown'},
    {name:'Cable Seated Row',eq:'cable',sets:'3 × 10–12', video:'https://youtu.be/1jkVEzMxTrA?si=6dUcFFz_hJp4uIfC',
     primary:['Rhomboids','Mid Trapezius'],secondary:['Latissimus Dorsi','Rear Deltoid','Biceps'],
     cue:'Sit tall, slight lean forward to start. Pull handle to your navel, retract shoulder blades fully at the end. Do not round forward on the return.',
     diagram:'seatedrow'},
    {name:'Cable Face Pull',eq:'cable',sets:'3 × 15', video:'https://youtu.be/0Po47vvj9g4?si=_vGhjIMl6V49oZzk',
     primary:['Rear Deltoid','External Rotators'],secondary:['Mid Trapezius','Rhomboids'],
     cue:'Cable at face height. Pull rope to your face, thumbs pointing behind you. Elbows flare out high. This protects your rotator cuff — do not skip it.',
     diagram:'facepull'},
    {name:'Dumbbell Hammer Curl',eq:'dumbbell',sets:'3 × 12', video:'https://youtu.be/P5sXHLmXmBM?si=xcWXV3_fKWkz3zkM',
     primary:['Brachialis'],secondary:['Brachioradialis','Biceps Brachii'],
     cue:'Neutral grip (thumbs up). Curl up keeping elbows pinned. The hammer grip targets the brachialis — the muscle that pushes the bicep up and adds arm thickness.',
     diagram:'hammer'},
    {name:'Dumbbell Incline Curl',eq:'dumbbell',sets:'2 × 12', video:'https://youtu.be/XVQBeug_9LU?si=ouELKy3OA13Y0UCz',
     primary:['Biceps Brachii (Long Head)'],secondary:['Brachialis'],
     cue:'Sit on incline bench (~60°), arms hang straight behind torso. Curl up slowly. The incline puts the long head on full stretch — best peak builder.',
     diagram:'inclinecurl'},
  ]},
  {name:'Legs',short:'Wed',color:'#22C55E',exercises:[
    {name:'Smith Machine Squat',eq:'smith',sets:'4 × 8–10', video:'https://youtu.be/DkImPSp93U4?si=e4rKMeum5uOqt8nI',
     primary:['Quadriceps'],secondary:['Glutes','Hamstrings','Adductors'],
     cue:'Feet slightly in front of the bar. Sit back and down, chest tall. Knees track over toes. Drive through the whole foot to stand.',
     diagram:'squat'},
    {name:'Smith Machine Romanian DL',eq:'smith',sets:'3 × 10–12', video:'https://youtu.be/cII0H9u3mEE?si=xdBifC4EGK2uSe47',
     primary:['Hamstrings','Glutes'],secondary:['Erector Spinae','Adductors'],
     cue:'Hinge at hips, bar stays close to legs. Feel the hamstring stretch as you lower — that is the point. Drive hips forward to stand, squeeze glutes at top.',
     diagram:'rdl'},
    {name:'Dumbbell Goblet Squat',eq:'dumbbell',sets:'3 × 12–15', video:'https://youtu.be/meJSJEG_sT0?si=hRrKhfSOVIElPQYI',
     primary:['Quadriceps'],secondary:['Glutes','Core','Adductors'],
     cue:'Hold DB vertically at chest. Elbows inside your knees as you sink. The weight counterbalances you, making it easier to sit upright.',
     diagram:'goblet'},
    {name:'Smith Machine Reverse Lunge',eq:'smith',sets:'3 × 10 each', video:'https://youtu.be/bMNZAlCi11w?si=0CRu5umgd7tcpIeQ',
     primary:['Quadriceps','Glutes'],secondary:['Hamstrings','Calves'],
     cue:'Step one foot back, lower the rear knee toward the floor. Front shin stays vertical. Push through the front heel to return. Alternate legs.',
     diagram:'lunge'},
    {name:'Cable Pull-Through',eq:'cable',sets:'3 × 15', video:'https://youtu.be/pv8e6OSyETE?si=hxC44KquM_-IF5hc',
     primary:['Glutes','Hamstrings'],secondary:['Erector Spinae'],
     cue:'Cable at low pulley, stand facing away. Hinge at the hips, rope between your legs, then drive hips forward to stand. Same motion as an RDL but from a cable.',
     diagram:'pullthrough'},
    {name:'Dumbbell Walking Lunge',eq:'dumbbell',sets:'2 × 10 each', video:'https://youtu.be/Pbmj6xPo-Hw?si=2vKDJmpFprG2doD-',
     primary:['Quadriceps','Glutes'],secondary:['Hamstrings','Calves','Core'],
     cue:'Step forward, lower rear knee just above the floor, then bring the rear foot forward. Continuous movement. Keep torso upright throughout.',
     diagram:'walklunge'},
    {name:'Smith Machine Calf Raise',eq:'smith',sets:'4 × 15–20', video:'https://youtu.be/t_bY3kVITE4?si=QOT_zD7ZKvSn1fP-',
     primary:['Gastrocnemius'],secondary:['Soleus'],
     cue:'Toes on a plate or step edge for full range. Lower heels all the way down, rise all the way up, pause and squeeze for one second at the top.',
     diagram:'calf'},
  ]},
  {name:'Upper',short:'Thu',color:'#A855F7',exercises:[
    {name:'Smith Machine Incline Press',eq:'smith',sets:'3 × 12', video:'https://youtu.be/FvjSzlPOaLo?si=KA4MlROrKyVVru9v',
     primary:['Pectoralis Major (upper)'],secondary:['Anterior Deltoid','Triceps'],
     cue:'Lighter than Day 1 — focus on control, not load. Feel the upper chest working, not just pushing weight.',
     diagram:'incline'},
    {name:'Smith Machine Bench Press',eq:'smith',sets:'4 × 8–10', video:'https://youtu.be/TL79FEmRHn0?si=FIRlPj5Pw2Gt1cHc',
     primary:['Pectoralis Major (mid)'],secondary:['Anterior Deltoid','Triceps'],
     cue:'Unrack and lower the bar to mid-chest with elbows at ~75°. Press straight up. The Smith guides the path — focus on feeling your chest contract rather than fighting balance.',
     diagram:'bench'},
    {name:'Cable Pulldown',eq:'cable',sets:'3 × 12', video:'https://youtu.be/xkZR2vTv9xQ?si=SGmNKHzyKlnX_Ihz',
     primary:['Latissimus Dorsi'],secondary:['Teres Major','Biceps'],
     cue:'Try a neutral or underhand grip today for variety. Same mechanics — elbows drive down toward your hips, squeeze at the bottom.',
     diagram:'pulldown'},
    {name:'Dumbbell Single-Arm Row',eq:'dumbbell',sets:'3 × 12 each', video:'https://youtu.be/DMo3HJoawrU?si=6kjJ4LHXnZ3GuiJY',
     primary:['Latissimus Dorsi'],secondary:['Rhomboids','Rear Deltoid','Biceps'],
     cue:'Go lighter than Pull day — focus on a full stretch at the bottom and a hard squeeze at the top. Mind-muscle connection is the goal.',

// ══════════════════════════════════════════════════════════
// DIAGRAM SYSTEM — two-panel SVG per exercise
//  LEFT: side-view exercise illustration
//  RIGHT: front/back muscle map with highlighted regions + labels
// ══════════════════════════════════════════════════════════

// ── MUSCLE MAP helpers ──
function mkDefs(id){
  return `<defs>
    <marker id="am${id}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="${MO}"/>
    </marker>
    <marker id="am2${id}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="${S}"/>
    </marker>
  </defs>`;
}

// ── MUSCLE MAP helpers ──
// Standard front-view torso outline (simplified SVG path, w=90, h=200 coordinate space)
// Returns SVG group centered at cx,cy scaled to fit mapW x mapH
function muscleMap(mapX, mapY, mapW, mapH, highlights, id){
  // highlights: array of {region, color, label, lx, ly}
  // regions: chest, upper_chest, shoulder_l, shoulder_r, lat_l, lat_r,
  //          bicep_l, bicep_r, tricep_l, tricep_r, quad_l, quad_r,
  //          ham_l, ham_r, glute_l, glute_r, calf_l, calf_r,
  //          trap, rear_delt_l, rear_delt_r, rhomboid, core, adductor_l, adductor_r

  // We draw a simplified anatomical silhouette in a 90×195 viewport
  // then scale/translate to mapX,mapY,mapW,mapH
  const vw=90, vh=195;
  const sx=mapW/vw, sy=mapH/vh;
  const tx=mapX, ty=mapY;

  // Helper: scale coords
  const x=n=>tx+n*sx;
  const y=n=>ty+n*sy;
  const r=(rx,ry)=>`${rx*sx} ${ry*sy}`;

  // Build region shapes (paths in 90×195 space, then translated)
  const regions={
    // HEAD
    head: `<ellipse cx="${x(45)}" cy="${y(9)}" rx="${8*sx}" ry="${9*sy}" fill="${SK}" stroke="${SKS}" stroke-width="0.8"/>`,
    // NECK
    neck: `<rect x="${x(40)}" y="${y(17)}" width="${6*sx}" height="${6*sy}" rx="2" fill="${SK}"/>`,
    // TORSO outline (chest + abs area)
    torso: `<path d="M${x(24)},${y(23)} Q${x(14)},${y(26)} ${x(15)},${y(50)} Q${x(16)},${y(62)} ${x(22)},${y(65)} L${x(24)},${y(82)} Q${x(25)},${y(88)} ${x(32)},${y(90)} L${x(58)},${y(90)} Q${x(65)},${y(88)} ${x(66)},${y(82)} L${x(68)},${y(65)} Q${x(74)},${y(62)} ${x(75)},${y(50)} Q${x(76)},${y(26)} ${x(66)},${y(23)} Z" fill="#2A2A3A" stroke="#3A3A4E" stroke-width="0.8"/>`,
    // UPPER CHEST
    upper_chest: `<path d="M${x(30)},${y(24)} Q${x(45)},${y(30)} ${x(60)},${y(24)} L${x(60)},${y(35)} Q${x(45)},${y(40)} ${x(30)},${y(35)} Z" fill="${EQ}" stroke="none"/>`,
    // CHEST (mid/lower)
    chest: `<path d="M${x(27)},${y(35)} Q${x(45)},${y(44)} ${x(63)},${y(35)} L${x(62)},${y(50)} Q${x(45)},${y(56)} ${x(28)},${y(50)} Z" fill="${EQ}" stroke="none"/>`,
    // ABS / CORE
    core: `<rect x="${x(31)}" y="${y(56)}" width="${28*sx}" height="${24*sy}" rx="${3*sx}" fill="${EQ}" stroke="none"/>`,
    // SHOULDERS
    shoulder_l: `<ellipse cx="${x(17)}" cy="${y(30)}" rx="${9*sx}" ry="${8*sy}" fill="${EQ}"/>`,
    shoulder_r: `<ellipse cx="${x(73)}" cy="${y(30)}" rx="${9*sx}" ry="${8*sy}" fill="${EQ}"/>`,
    // UPPER ARMS (front = bicep area)
    bicep_l: `<path d="M${x(10)},${y(35)} Q${x(6)},${y(52)} ${x(10)},${y(62)} L${x(18)},${y(60)} Q${x(20)},${y(50)} ${x(21)},${y(37)} Z" fill="${EQ}"/>`,
    bicep_r: `<path d="M${x(80)},${y(35)} Q${x(84)},${y(52)} ${x(80)},${y(62)} L${x(72)},${y(60)} Q${x(70)},${y(50)} ${x(69)},${y(37)} Z" fill="${EQ}"/>`,
    // FOREARMS
    forearm_l: `<path d="M${x(9)},${y(63)} Q${x(5)},${y(76)} ${x(8)},${y(85)} L${x(15)},${y(83)} Q${x(18)},${y(74)} ${x(17)},${y(62)} Z" fill="${EQ}" opacity=".6"/>`,
    forearm_r: `<path d="M${x(81)},${y(63)} Q${x(85)},${y(76)} ${x(82)},${y(85)} L${x(75)},${y(83)} Q${x(72)},${y(74)} ${x(73)},${y(62)} Z" fill="${EQ}" opacity=".6"/>`,
    // TRICEP (back of arm — shown on front view as outer arm)
    tricep_l: `<path d="M${x(10)},${y(36)} Q${x(4)},${y(50)} ${x(8)},${y(62)} L${x(12)},${y(60)} Q${x(10)},${y(50)} ${x(15)},${y(38)} Z" fill="${EQ}"/>`,
    tricep_r: `<path d="M${x(80)},${y(36)} Q${x(86)},${y(50)} ${x(82)},${y(62)} L${x(78)},${y(60)} Q${x(80)},${y(50)} ${x(75)},${y(38)} Z" fill="${EQ}"/>`,
    // LATS (visible on sides of torso front view)
    lat_l: `<path d="M${x(20)},${y(38)} Q${x(18)},${y(55)} ${x(22)},${y(65)} L${x(28)},${y(62)} Q${x(26)},${y(52)} ${x(26)},${y(40)} Z" fill="${EQ}"/>`,
    lat_r: `<path d="M${x(70)},${y(38)} Q${x(72)},${y(55)} ${x(68)},${y(65)} L${x(62)},${y(62)} Q${x(64)},${y(52)} ${x(64)},${y(40)} Z" fill="${EQ}"/>`,
    // TRAP (upper, front visible)
    trap: `<path d="M${x(35)},${y(22)} Q${x(45)},${y(26)} ${x(55)},${y(22)} L${x(60)},${y(25)} Q${x(45)},${y(30)} ${x(30)},${y(25)} Z" fill="${EQ}"/>`,
    // HIPS
    hip_l: `<path d="M${x(22)},${y(82)} Q${x(18)},${y(92)} ${x(22)},${y(100)} L${x(35)},${y(100)} L${x(33)},${y(90)} Z" fill="${EQ}"/>`,
    hip_r: `<path d="M${x(68)},${y(82)} Q${x(72)},${y(92)} ${x(68)},${y(100)} L${x(55)},${y(100)} L${x(57)},${y(90)} Z" fill="${EQ}"/>`,
    // GLUTES (shown on lower torso/hip front view)
    glute_l: `<path d="M${x(22)},${y(84)} Q${x(15)},${y(96)} ${x(22)},${y(104)} L${x(36)},${y(102)} Q${x(34)},${y(94)} ${x(30)},${y(84)} Z" fill="${EQ}"/>`,
    glute_r: `<path d="M${x(68)},${y(84)} Q${x(75)},${y(96)} ${x(68)},${y(104)} L${x(54)},${y(102)} Q${x(56)},${y(94)} ${x(60)},${y(84)} Z" fill="${EQ}"/>`,
    // QUADS
    quad_l: `<path d="M${x(24)},${y(102)} Q${x(18)},${y(128)} ${x(22)},${y(148)} L${x(34)},${y(146)} Q${x(34)},${y(128)} ${x(36)},${y(102)} Z" fill="${EQ}"/>`,
    quad_r: `<path d="M${x(66)},${y(102)} Q${x(72)},${y(128)} ${x(68)},${y(148)} L${x(56)},${y(146)} Q${x(56)},${y(128)} ${x(54)},${y(102)} Z" fill="${EQ}"/>`,
    // ADDUCTORS (inner thigh)
    adductor_l: `<path d="M${x(36)},${y(102)} Q${x(38)},${y(128)} ${x(36)},${y(148)} L${x(42)},${y(148)} Q${x(44)},${y(128)} ${x(44)},${y(102)} Z" fill="${EQ}"/>`,
    adductor_r: `<path d="M${x(54)},${y(102)} Q${x(52)},${y(128)} ${x(54)},${y(148)} L${x(48)},${y(148)} Q${x(46)},${y(128)} ${x(46)},${y(102)} Z" fill="${EQ}"/>`,
    // HAMSTRINGS (back of thigh, slightly shown on side)
    ham_l: `<path d="M${x(24)},${y(104)} Q${x(20)},${y(128)} ${x(24)},${y(148)} L${x(30)},${y(147)} Q${x(28)},${y(128)} ${x(30)},${y(104)} Z" fill="${EQ}" opacity=".5"/>`,
    ham_r: `<path d="M${x(66)},${y(104)} Q${x(70)},${y(128)} ${x(66)},${y(148)} L${x(60)},${y(147)} Q${x(62)},${y(128)} ${x(60)},${y(104)} Z" fill="${EQ}" opacity=".5"/>`,
    // CALVES
    calf_l: `<path d="M${x(23)},${y(150)} Q${x(19)},${y(168)} ${x(22)},${y(184)} L${x(32)},${y(182)} Q${x(34)},${y(168)} ${x(33)},${y(150)} Z" fill="${EQ}"/>`,
    calf_r: `<path d="M${x(67)},${y(150)} Q${x(71)},${y(168)} ${x(68)},${y(184)} L${x(58)},${y(182)} Q${x(56)},${y(168)} ${x(57)},${y(150)} Z" fill="${EQ}"/>`,
    // FEET
    foot_l: `<ellipse cx="${x(27)}" cy="${y(188)}" rx="${10*sx}" ry="${5*sy}" fill="${EQ}" opacity=".5"/>`,
    foot_r: `<ellipse cx="${x(63)}" cy="${y(188)}" rx="${10*sx}" ry="${5*sy}" fill="${EQ}" opacity=".5"/>`,
    // REAR DELTS (shown as outer shoulder on back-biased view)
    rear_delt_l: `<ellipse cx="${x(14)}" cy="${y(28)}" rx="${8*sx}" ry="${7*sy}" fill="${EQ}"/>`,
    rear_delt_r: `<ellipse cx="${x(76)}" cy="${y(28)}" rx="${8*sx}" ry="${7*sy}" fill="${EQ}"/>`,
    // RHOMBOID / MID TRAP (center upper back, shown slightly on front)
    rhomboid: `<path d="M${x(33)},${y(24)} Q${x(45)},${y(28)} ${x(57)},${y(24)} L${x(56)},${y(38)} Q${x(45)},${y(42)} ${x(34)},${y(38)} Z" fill="${EQ}"/>`,
  };

  // Draw order: base shapes then highlights on top
  const allRegions=Object.keys(regions);

  // Build label SVG elements
  const labelEls=highlights.map(h=>{
    // Leader line from label to approximate muscle center
    return `<text x="${x(h.lx)}" y="${y(h.ly)}" text-anchor="${h.lx<45?'end':'start'}" font-family="${F}" font-size="${9.5*Math.min(sx,sy)}" font-weight="700" fill="${h.color}">${h.label}</text>`;
  }).join('');

  // Render all regions — highlighted ones get a glow halo + bright solid fill
  const hlMap={};
  highlights.forEach(h=>{
    const regs=Array.isArray(h.region)?h.region:[h.region];
    regs.forEach(r=>{hlMap[r]=h.color;});
  });

  const regionSVG=allRegions.map(k=>{
    if(!regions[k])return '';
    if(hlMap[k]){
      const col=hlMap[k];
      // Glow layer: same shape, expanded slightly, very transparent
      const glow=regions[k]
        .replace(/fill="[^"]*"/g,`fill="${col}"`)
        .replace(/opacity="[^"]*"/g,'opacity="0.18"')
        .replace(/stroke(-width)?="[^"]*"/g,'')
        .replace(/rx="([\d.]+)"/g,(_,v)=>`rx="${parseFloat(v)*1.4}"`)
        .replace(/ry="([\d.]+)"/g,(_,v)=>`ry="${parseFloat(v)*1.4}"`);
      // Main layer: full color, high opacity, colored stroke for definition
      const main=regions[k]
        .replace(/fill="[^"]*"/g,`fill="${col}"`)
        .replace(/opacity="[^"]*"/g,'opacity="0.92"')
        .replace(/stroke="[^"]*"/g,`stroke="${col}"`)
        .replace(/stroke-width="[^"]*"/g,'stroke-width="1"');
      return glow+'\n'+main;
    }
    return regions[k];
  }).join('\n');

  // Build legend
  const hasPrimary=highlights.some(h=>h.color===P);
  const hasSecondary=highlights.some(h=>h.color===S);
  let legendItems='';
  const lx=tx+4, ly=ty+mapH+2;
  if(hasPrimary) legendItems+=`<rect x="${lx}" y="${ly-8}" width="7" height="7" rx="1.5" fill="${P}" opacity="0.9"/><text x="${lx+10}" y="${ly}" font-family="${F}" font-size="7" font-weight="700" fill="${P}" opacity="0.85">PRIMARY</text>`;
  if(hasSecondary) legendItems+=`<rect x="${lx+60}" y="${ly-8}" width="7" height="7" rx="1.5" fill="${S}" opacity="0.9"/><text x="${lx+70}" y="${ly}" font-family="${F}" font-size="7" font-weight="700" fill="${S}" opacity="0.85">SECONDARY</text>`;

  return `<g>
    ${regionSVG}
    ${labelEls}
    <g>${legendItems}</g>
  </g>`;
}

// ── DIVIDER line between panels
function divider(x, y1, y2){
  return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#2A2A3A" stroke-width="1"/>`;
}

// ── Panel label
function panelLabel(x, y, text){
  return `<text x="${x}" y="${y}" font-family="${F}" font-size="8" font-weight="700" letter-spacing=".12em" fill="#444455" text-anchor="middle">${text}</text>`;
}

// ──────────── ANATOMICAL-ONLY VIEW ────────────
// Replaces workout demo drawings with a clean anatomical muscle map for each exercise.
function regionsForMuscleName(name){
  const m=(name||'').toLowerCase();
  const regs=[];
  if(m.includes('pectoralis') || m.includes('chest')){
    if(m.includes('upper')) regs.push('upper_chest');
    else regs.push('chest','upper_chest');
  }
  if(m.includes('anterior deltoid')) regs.push('shoulder_l','shoulder_r');
  if(m.includes('medial deltoid')) regs.push('shoulder_l','shoulder_r');
  if(m.includes('rear deltoid') || m.includes('external rotator') || m.includes('supraspinatus')) regs.push('rear_delt_l','rear_delt_r');
  if(m.includes('triceps') || m.includes('tri')) regs.push('tricep_l','tricep_r');
  if(m.includes('biceps')) regs.push('bicep_l','bicep_r');
  if(m.includes('brachialis') || m.includes('brachioradialis')) regs.push('bicep_l','bicep_r','forearm_l','forearm_r');
  if(m.includes('latissimus') || m.includes('teres major')) regs.push('lat_l','lat_r');
  if(m.includes('rhomboid') || m.includes('mid trapezius')) regs.push('rhomboid');
  if(m.includes('trapezius') || m.includes('trap')) regs.push('trap','rhomboid');
  if(m.includes('quadriceps') || m.includes('quad')) regs.push('quad_l','quad_r');
  if(m.includes('hamstring')) regs.push('ham_l','ham_r');
  if(m.includes('glute')) regs.push('glute_l','glute_r');
  if(m.includes('adductor')) regs.push('adductor_l','adductor_r');
  if(m.includes('gastrocnemius') || m.includes('soleus') || m.includes('calves') || m.includes('calf')) regs.push('calf_l','calf_r');
  if(m.includes('erector')) regs.push('rhomboid','core');
  if(m.includes('core')) regs.push('core');
  if(m.includes('forearm')) regs.push('forearm_l','forearm_r');
  return regs;
}
function shortMuscleLabel(name){
  const m=(name||'').toLowerCase();
  if(m.includes('pectoralis')) return m.includes('upper')?'UPPER CHEST':'CHEST';
  if(m.includes('anterior deltoid')) return 'FRONT DELT';
  if(m.includes('medial deltoid')) return 'SIDE DELT';
  if(m.includes('rear deltoid')) return 'REAR DELT';
  if(m.includes('triceps')) return 'TRICEPS';
  if(m.includes('biceps')) return 'BICEPS';
  if(m.includes('brachialis')) return 'BRACHIALIS';
  if(m.includes('brachioradialis')) return 'FOREARM';
  if(m.includes('latissimus')) return 'LATS';
  if(m.includes('teres major')) return 'TERES';
  if(m.includes('rhomboid')) return 'RHOMBOIDS';
  if(m.includes('mid trapezius')) return 'MID TRAP';
  if(m.includes('upper trapezius') || m.includes('trapezius')) return 'TRAPS';
  if(m.includes('quadriceps')) return 'QUADS';
  if(m.includes('hamstring')) return 'HAMSTRINGS';
  if(m.includes('glute')) return 'GLUTES';
  if(m.includes('adductor')) return 'ADDUCTORS';
  if(m.includes('gastrocnemius')) return 'CALVES';
  if(m.includes('soleus')) return 'SOLEUS';
  if(m.includes('erector')) return 'ERECTORS';
  if(m.includes('core')) return 'CORE';
  return name.toUpperCase().replace(/\s*\([^)]*\)/g,'').slice(0,12);
}
function buildHighlights(ex){
  const highlights=[];
  const seen=new Set();
  const labelSlots=[
    [18,30],[82,30],[18,50],[82,50],[18,72],[82,72],[18,95],[82,95],[18,120],[82,120],[18,145],[82,145]
  ];
  let slot=0;
  function add(name,color){
    const regs=regionsForMuscleName(name);
    if(!regs.length) return;
    const key=color+'|'+shortMuscleLabel(name)+'|'+regs.join(',');
    if(seen.has(key)) return;
    seen.add(key);
    const [lx,ly]=labelSlots[slot++ % labelSlots.length];
    highlights.push({region:regs,color,label:shortMuscleLabel(name),lx,ly});
  }
  (ex.primary||[]).forEach(m=>add(m,P));
  (ex.secondary||[]).forEach(m=>add(m,S));
  return highlights;
}
function muscleOnlyDiagram(ex,W,H){
  const id=('an'+ex.name).replace(/[^a-z0-9]/gi,'').slice(0,12);
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${mkDefs(id)}
    <rect x="0" y="0" width="${W}" height="${H}" rx="12" fill="#0D0D0F"/>
    <text x="${W/2}" y="16" text-anchor="middle" font-family="${F}" font-size="11" font-weight="800" letter-spacing=".12em" fill="#888899">ANATOMICAL MUSCLE TARGETS</text>
    ${muscleMap(34,24,W-68,H-42,buildHighlights(ex),id)}
  </svg>`;
}

// ──────────── STATE & RENDER ────────────
const dayColors=['#FF5722','#3A7EFF','#22C55E','#A855F7','#F59E0B'];
let activeDay=0, activeEx=0;

function renderTabs(){
  document.getElementById('dayTabs').innerHTML=days.map((d,i)=>`
    <div class="day-tab ${i===activeDay?'on':''}" style="--tab-accent:${dayColors[i]}" onclick="setDay(${i})">
      <span class="tab-short">${d.short}</span>
      <span class="tab-name">${d.name}</span>
    </div>`).join('');
}
function renderNav(){
  const d=days[activeDay];const col=dayColors[activeDay];
  document.getElementById('exDots').innerHTML=d.exercises.map((e,i)=>`
    <div class="ex-dot ${i===activeEx?'on':''}" style="--dot-accent:${col}" onclick="setEx(${i})">${i+1}</div>`).join('');
  document.getElementById('prevBtn').disabled=activeEx===0;
  document.getElementById('nextBtn').disabled=activeEx===d.exercises.length-1;
  document.getElementById('exCount').textContent=`${activeEx+1} / ${d.exercises.length}`;
}

function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function getVideoEmbed(url){
  if(!url || !String(url).trim()) return null;
  const raw=String(url).trim();
  const safe=escapeHtml(raw);
  const mp4=/\.(mp4|webm|ogg)(\?.*)?$/i.test(raw);
  if(mp4){return `<video controls preload="metadata" src="${safe}"></video>`;}
  let yt=null;
  try{
    const u=new URL(raw);
    if(u.hostname.includes('youtu.be')) yt=u.pathname.replace('/','');
    if(u.hostname.includes('youtube.com')){
      if(u.pathname.startsWith('/shorts/')) yt=u.pathname.split('/')[2];
      else yt=u.searchParams.get('v');
    }
  }catch(e){}
  if(yt){return `<iframe src="https://www.youtube.com/embed/${escapeHtml(yt)}" title="Exercise video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;}
  return `<div class="video-empty">Video link added, but it is not embeddable here.<br><a class="video-link" href="${safe}" target="_blank" rel="noopener">Open video in new tab</a></div>`;
}
function renderVideo(ex){
  const embed=getVideoEmbed(ex.video);
  return `<div class="video-section">
    <div class="video-head"><span class="video-title">Exercise video</span><span class="video-tip">Paste a YouTube or MP4 URL in this exercise’s video field</span></div>
    <div class="video-frame">${embed || `<div class="video-empty">No video added yet.<br>Find this exercise in the <code>days</code> list and change <code>video:''</code> to your video URL.</div>`}</div>
  </div>`;
}

function renderCard(){
  const d=days[activeDay];const ex=d.exercises[activeEx];const col=dayColors[activeDay];
  const svgHtml=muscleOnlyDiagram(ex,264,320);
  document.getElementById('exCard').innerHTML=`
    <div class="card-header" style="border-left:3px solid ${col}">
      <div class="card-title-wrap">
        <div class="card-title">${ex.name}</div>
        <div class="card-badges"><span class="badge ${eqCls[ex.eq]}">${eqLbl[ex.eq]}</span></div>
      </div>
      <div class="card-sets"><span class="sets-label">Sets · Reps</span>${ex.sets}</div>
    </div>
    <div class="card-body">
      <div class="diagram-panel">${svgHtml}</div>
      <div class="info-panel">
        <div>
          <div class="muscle-section-title">Primary muscles</div>
          <div class="m-tags">${ex.primary.map(m=>`<span class="m-tag m-primary">${m}</span>`).join('')}</div>
        </div>
        <div>
          <div class="muscle-section-title">Secondary muscles</div>
          <div class="m-tags">${ex.secondary.map(m=>`<span class="m-tag m-secondary">${m}</span>`).join('')}</div>
        </div>
        <div class="cue-box" style="border-left-color:${col}">
          <span class="cue-label">Coaching cue</span>
          <p>${ex.cue}</p>
        </div>
        ${renderVideo(ex)}
      </div>
    </div>`;
}
function setDay(i){activeDay=i;activeEx=0;renderTabs();renderNav();renderCard();}
function setEx(i){activeEx=i;renderNav();renderCard();}
function changeEx(dir){const n=activeEx+dir;const len=days[activeDay].exercises.length;if(n>=0&&n<len)setEx(n);}
renderTabs();renderNav();renderCard();
</script>
